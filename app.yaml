name: data-legend
description: Building the Trust Layer for Indian Healthcare

command:
  - streamlit
  - run
  - app/main.py
  - --server.port
  - "8080"
  - --server.address
  - "0.0.0.0"

env:
  - name: STREAMLIT_SERVER_ENABLE_CORS
    value: "false"
  - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
    value: "false"
  - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
    value: "false"
  - name: MLFLOW_TRACKING_URI
    value: "databricks"

permissions:
  - level: "CAN_VIEW"
    principal: "users"
